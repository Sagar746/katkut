<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katkut AI</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0f0e13; color: #f0eef8; }
    a { color: #8fb8ff; }
  }
  .wrap { text-align: center; padding: 24px; }
  .brand-mark {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, #8b2fc9, #2fc9d6);
    margin: 0 auto 20px;
  }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 8px; }
  p { color: #6b6880; margin: 0 0 24px; }
  a.link { font-size: 15px; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand-mark"></div>
    <h1>Katkut AI</h1>
    <p>Turn your clips into a reel in seconds.</p>
    <a class="link" href="/privacy-policy">Privacy Policy →</a>
  </div>
</body>
</html>
